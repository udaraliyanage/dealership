<!DOCTYPE html>
<html>
<head>
    <title>AI Dealership Test</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        #chatbox { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #f9f9f9; }
        .message { margin: 5px 0; }
        .user { color: blue; }
        .ai { color: green; }
        input { width: 300px; padding: 8px; }
        button { padding: 8px 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🚗 AI Dealership Test</h1>
    
    <div id="chatbox"></div>
    <input type="text" id="input" placeholder="I want an SUV for 20k..." />
    <button onclick="sendMessage()">Ask AI</button>
    
    <hr>
    <h3>Quick Test Buttons:</h3>
    <button onclick="testBackendHealth()">Test Backend Health</button>
    <button onclick="testBackendChat()">Test Backend Chat</button>
    <button onclick="testAIAgent()">Test AI Agent Direct</button>
    
    <div id="debug" style="border: 1px solid red; padding: 10px; margin-top: 20px; background: #ffe0e0;">
        <h3>Debug Log:</h3>
        <pre id="debugLog"></pre>
    </div>

    <script>
        const API_URL = 'http://localhost:5001';
        
        function log(msg) {
            const debugLog = document.getElementById('debugLog');
            debugLog.innerHTML += new Date().toLocaleTimeString() + ' - ' + msg + '\n';
            console.log(msg);
        }
        
        function addChatMessage(role, text) {
            const chatbox = document.getElementById('chatbox');
            const msg = document.createElement('div');
            msg.className = 'message ' + role;
            msg.innerHTML = '<strong>' + (role === 'user' ? 'You' : 'AI') + ':</strong> ' + text;
            chatbox.appendChild(msg);
            chatbox.scrollTop = chatbox.scrollHeight;
        }
        
        async function sendMessage() {
            const input = document.getElementById('input');
            const message = input.value.trim();
            if (!message) return;
            
            addChatMessage('user', message);
            input.value = '';
            
            log('Sending message: ' + message);
            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }
                
                const data = await response.json();
                log('Got response: ' + JSON.stringify(data));
                addChatMessage('ai', data.reply);
            } catch (error) {
                log('ERROR: ' + error.message);
                addChatMessage('ai', 'Error: ' + error.message);
            }
        }
        
        async function testBackendHealth() {
            log('Testing backend health...');
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                log('Backend health: ' + JSON.stringify(data));
            } catch (error) {
                log('ERROR: ' + error.message);
            }
        }
        
        async function testBackendChat() {
            log('Testing backend chat...');
            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: 'test SUV' })
                });
                const data = await response.json();
                log('Backend chat response: ' + JSON.stringify(data));
            } catch (error) {
                log('ERROR: ' + error.message);
            }
        }
        
        async function testAIAgent() {
            log('Testing AI agent direct...');
            try {
                const response = await fetch('http://localhost:8080/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: 'test truck' })
                });
                const data = await response.json();
                log('AI Agent response: ' + JSON.stringify(data));
            } catch (error) {
                log('ERROR: ' + error.message);
            }
        }
        
        // Allow Enter key to send
        document.getElementById('input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
        
        log('Page loaded. Click test buttons or type a message.');
    </script>
</body>
</html>
