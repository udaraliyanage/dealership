services:
  ai-agent:
    build: ./ai-agent
    ports:
      - "8080:8080"
    environment:
      # Using the key you provided directly
      GOOGLE_API_KEY: "xxxxxxx"
      BACKEND_URL: "http://backend-api:5001"
    depends_on:
      - backend-api

  backend-api:
    build: ./backend-api
    ports:
      - "5001:5001"
    environment:
      PORT: "5001"
      AI_AGENT_URL: "http://ai-agent:8080"
      DEBUG_LOGGING: "true"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: "http://localhost:5001"
    # Note: VITE_API_URL is usually better handled in a .env file 
    # within the frontend folder, but since App.jsx defaults to 
    # localhost:5001, this service is good to go!
    depends_on:
      - backend-api