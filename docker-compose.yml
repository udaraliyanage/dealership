services:

  backend-api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      PORT: "5001"
      AI_AGENT_URL: "http://ai-agent:8080"
      DEBUG_LOGGING: "true"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 8s
      timeout: 5s
      retries: 10
      start_period: 15s

  ai-agent:
    build:
      context: ./ai-agent
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      GOOGLE_API_KEY: "AIzaSyDXDCJ06PTn50Isqm9Eji6LSSAa1iJpOCQ"
      BACKEND_URL: "http://backend-api:5001"
    depends_on:
      backend-api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:5001"
    ports:
      - "3000:3000"
    depends_on:
      backend-api:
        condition: service_healthy
